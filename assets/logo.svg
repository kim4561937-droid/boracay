<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Cyan Neon Glow -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradient definition -->
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" />
      <stop offset="100%" stop-color="#16C784" />
    </linearGradient>
  </defs>

  <!-- Background grid representation (subtle dark circles) -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#121A2F" stroke-width="1.5" />
  <circle cx="50" cy="50" r="30" fill="none" stroke="#121A2F" stroke-width="1" />
  <circle cx="50" cy="50" r="15" fill="none" stroke="#121A2F" stroke-width="0.5" />

  <!-- Orbiting pulse node (Glowing) -->
  <circle cx="20" cy="50" r="3" fill="#00D4FF" filter="url(#glow-cyan)" />
  <circle cx="80" cy="50" r="3" fill="#16C784" filter="url(#glow-cyan)" />

  <!-- Main ECG Pulse Line -->
  <path d="M 15 50 
           L 35 50 
           L 42 30 
           L 48 75 
           L 54 20 
           L 60 60 
           L 65 47 
           L 70 50 
           L 85 50" 
        fill="none" 
        stroke="url(#pulse-grad)" 
        stroke-width="4.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow-cyan)" />

  <!-- Center Accent Core -->
  <circle cx="54" cy="20" r="1.5" fill="#FFFFFF" />
  <circle cx="48" cy="75" r="1.5" fill="#FFFFFF" />
</svg>
